name: multiscale-stability

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  windows-msys2:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-msmpi
            mingw-w64-ucrt-x86_64-eigen3
            mingw-w64-ucrt-x86_64-fast_float
            mingw-w64-ucrt-x86_64-nlohmann-json
            mingw-w64-ucrt-x86_64-vtk
            mingw-w64-ucrt-x86_64-tbb
            mingw-w64-ucrt-x86_64-petsc
            mingw-w64-ucrt-x86_64-texlive-core
            mingw-w64-ucrt-x86_64-texlive-latex-recommended
            mingw-w64-ucrt-x86_64-texlive-latex-extra
            mingw-w64-ucrt-x86_64-texlive-pictures
            mingw-w64-ucrt-x86_64-texlive-science
            mingw-w64-ucrt-x86_64-texlive-fonts-recommended
            mingw-w64-ucrt-x86_64-texlive-plain-generic
            mingw-w64-ucrt-x86_64-texlive-extra-utils
            mingw-w64-ucrt-x86_64-texlive-lang-english

      - name: Ensure Microsoft MPI runtime
        shell: powershell
        run: |
          $msmpiDirs = @(
            (Join-Path $env:WINDIR "System32"),
            "C:\Program Files\Microsoft MPI\Bin"
          ) | Where-Object { Test-Path $_ }

          $msmpiDlls = $msmpiDirs | ForEach-Object { Join-Path $_ "msmpi.dll" }
          $installedDll = $msmpiDlls | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $installedDll) {
            $winget = Get-Command winget.exe -ErrorAction SilentlyContinue
            if (-not $winget) {
              throw "MS-MPI runtime (msmpi.dll) was not found and winget.exe is unavailable to install Microsoft.msmpi."
            }

            winget install --exact --id Microsoft.msmpi `
              --accept-package-agreements `
              --accept-source-agreements `
              --silent `
              --disable-interactivity

            $installedDll = $msmpiDlls | Where-Object { Test-Path $_ } | Select-Object -First 1
          }

          if (-not $installedDll) {
            throw "MS-MPI runtime installation completed, but msmpi.dll was not found in System32 or 'C:\Program Files\Microsoft MPI\Bin'."
          }

          $installedDir = Split-Path -Parent $installedDll
          "MSMPI_RUNTIME_DIR=$installedDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "MS-MPI runtime: $installedDll"

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: Build multiscale regression targets
        run: |
          JOBS="$(nproc)"
          for target in \
            fall_n_multiscale_api_test \
            fall_n_micro_solve_executor_test \
            fall_n_evolver_advanced_test \
            fall_n_tangent_validation_benchmark_test \
            fall_n_coupling_residual_benchmark_test \
            fall_n_beam_test \
            fall_n_steppable_solver_test \
            fall_n_steppable_dynamic_test
          do
            ninja -C build -j"$JOBS" "$target"
          done

      - name: Build heavy multiscale examples
        run: |
          JOBS="$(nproc)"
          for target in \
            fall_n_lshaped_multiscale \
            fall_n_lshaped_multiscale_16 \
            fall_n_table_multiscale \
            fall_n_table_cyclic_validation
          do
            ninja -C build -j"$JOBS" "$target"
          done

      - name: Preflight DLL check
        run: |
          echo "--- ldd check for VTK/PETSc transitive dependencies ---"
          for exe in \
            build/fall_n_multiscale_api_test.exe \
            build/fall_n_evolver_advanced_test.exe \
            build/fall_n_tangent_validation_benchmark_test.exe; do
            echo "\n=== $exe ==="
            ldd "$exe" | tee ldd.out
            missing="$(grep -i 'not found' ldd.out \
              | grep -viE '^[[:space:]]*(api-ms-win-(crt|core)-|ext-ms-win-)' || true)"
            if [ -n "$missing" ]; then
              echo "$missing"
              echo "MISSING DLL for $exe"
              exit 1
            fi
          done
          echo "--- All DLL dependencies satisfied ---"

      - name: Run multiscale regression tests
        shell: powershell
        run: |
          $msysRoots = @(
            (Join-Path $env:RUNNER_TEMP "msys64"),
            (Join-Path $env:RUNNER_TEMP "setup-msys2\msys64"),
            "C:\msys64"
          ) | Where-Object { Test-Path $_ }

          if ($msysRoots.Count -eq 0) {
            throw "Unable to locate an MSYS2 runtime root under RUNNER_TEMP or C:\msys64."
          }

          $msysRoot = $msysRoots[0]
          $ucrtBin = Join-Path $msysRoot "ucrt64\bin"
          $msmpiBinCandidates = @(
            $env:MSMPI_RUNTIME_DIR,
            (Join-Path $env:WINDIR "System32"),
            "C:\Program Files\Microsoft MPI\Bin"
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique

          foreach ($bin in @($ucrtBin)) {
            if (-not (Test-Path $bin)) {
              throw "Expected runtime directory not found: $bin"
            }
          }

          $runtimeBins = @($ucrtBin) + $msmpiBinCandidates
          $env:PATH = (($runtimeBins | Select-Object -Unique) -join ";") + ";$env:PATH"
          Write-Host "MSYS2 runtime root: $msysRoot"
          if ($msmpiBinCandidates.Count -gt 0) {
            Write-Host "MS-MPI runtime dirs: $($msmpiBinCandidates -join '; ')"
          }

          $requiredDlls = @(
            "libstdc++-6.dll",
            "libgcc_s_seh-1.dll",
            "libwinpthread-1.dll",
            "libgomp-1.dll",
            "libvtkCommonCore.dll",
            "libvtkIOXML.dll",
            "libtbb12.dll",
            "libpetsc-dmo.dll",
            "libgfortran-5.dll",
            "libhwloc-15.dll",
            "libltdl-7.dll",
            "libmetis.dll",
            "libparmetis.dll",
            "libopenblas.dll",
            "libquadmath-0.dll"
          )

          foreach ($dll in $requiredDlls) {
            $dllPath = Join-Path $ucrtBin $dll
            if (-not (Test-Path $dllPath)) {
              throw "Missing expected runtime dependency in UCRT64 bin: $dll"
            }
          }

          $msmpiDllCandidates = $msmpiBinCandidates | ForEach-Object { Join-Path $_ "msmpi.dll" }
          $msmpiDll = $msmpiDllCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $msmpiDll) {
            throw "MS-MPI runtime DLL (msmpi.dll) was not found in any configured runtime directory."
          }
          Write-Host "Using MS-MPI runtime DLL: $msmpiDll"

          $stagedRuntimeDlls = $requiredDlls + @("msmpi.dll")
          foreach ($dll in ($stagedRuntimeDlls | Select-Object -Unique)) {
            $source = @(
              (Join-Path $ucrtBin $dll),
              ($msmpiBinCandidates | ForEach-Object { Join-Path $_ $dll })
            ) | Where-Object { Test-Path $_ } | Select-Object -First 1

            if ($source) {
              Copy-Item -Path $source -Destination ".\build\$dll" -Force
            }
          }

          $runtimePatterns = @(
            "libpetsc*.dll",
            "libmetis*.dll",
            "libparmetis*.dll",
            "libhwloc*.dll",
            "libltdl*.dll",
            "libopenblas*.dll",
            "libgfortran*.dll",
            "libquadmath*.dll",
            "libstdc++*.dll",
            "libgcc_s*.dll",
            "libwinpthread*.dll",
            "libgomp*.dll",
            "libtbb*.dll"
          )

          foreach ($pattern in $runtimePatterns) {
            Get-ChildItem -Path $ucrtBin -Filter $pattern -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination (Join-Path ".\build" $_.Name) -Force
            }
          }

          $executables = @(
            ".\build\fall_n_multiscale_api_test.exe",
            ".\build\fall_n_micro_solve_executor_test.exe",
            ".\build\fall_n_evolver_advanced_test.exe",
            ".\build\fall_n_tangent_validation_benchmark_test.exe",
            ".\build\fall_n_coupling_residual_benchmark_test.exe",
            ".\build\fall_n_beam_test.exe",
            ".\build\fall_n_steppable_solver_test.exe",
            ".\build\fall_n_steppable_dynamic_test.exe"
          )

          foreach ($exe in $executables) {
            & $exe
            if ($LASTEXITCODE -ne 0) {
              if ($LASTEXITCODE -eq -1073741515) {
                Write-Warning "STATUS_DLL_NOT_FOUND while launching $exe"
                Write-Host "Runtime PATH prefix: $($runtimeBins -join ';')"
                Write-Host "MS-MPI DLL candidates:"
                $msmpiDllCandidates | ForEach-Object { Write-Host "  $_ => $(Test-Path $_)" }
              }
              throw "Regression executable failed: $exe (exit $LASTEXITCODE)"
            }
          }

      - name: Compile documentation
        working-directory: doc
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex || {
            pdflatex -interaction=nonstopmode -halt-on-error main.tex
            pdflatex -interaction=nonstopmode -halt-on-error main.tex
          }
